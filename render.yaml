databases:
  - name: django-portfolio-db
    databaseName: django_portfolio
    plan: free

services:
  - type: web
    name: django-portfolio-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate && gunicorn django_portfolio.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: DJANGO_DB_SSL_REQUIRE
        value: True
      - key: DATABASE_URL
        fromDatabase:
          name: django-portfolio-db
          property: connectionString
